<h2>Reportes 📊</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Obra</th>
    <th>Obrero</th>
    <th>Ubicación</th>
    <th>Actividad</th>
    <th>Etapa</th>
    <th>Fecha</th>
    <th>Foto</th>
</tr>

{% for d in datos %}
<tr>
    <td>{{ d[0] }}</td>
    <td>{{ d[1] }}</td>
    <td>{{ d[2] }}</td>
    <td>{{ d[3] }}</td>
    <td>{{ d[4] }}</td>
    <td>{{ d[5] }}</td>
    <td>{{ d[6] }}</td>
    <td><a href="{{ d[7] }}" target="_blank">Ver</a></td>
</tr>
{% endfor %}

</table>
