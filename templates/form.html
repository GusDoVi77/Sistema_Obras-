<form method="POST" enctype="multipart/form-data">

<label>🏗️ Obra</label>
<input type="text" name="obra" required>

<label>👷 Obrero</label>
<input type="text" name="nombre" required>

<label>📍 Ubicación</label>
<input type="text" name="ubicacion" required>

<label>⚙️ Actividad</label>
<select name="actividad">
    <option>Contrapiso</option>
    <option>Impermeabilización</option>
    <option>Terminación</option>
</select>

<label>📋 Etapa</label>
<select name="etapa" required>
    <option value="">Seleccionar</option>
    <option>1 - Contrapiso</option>
    <option>2 - Carpeta</option>
    <option>3 - Babetas</option>
    <option>4 - Impermeabilización</option>
    <option>5 - Pegado membrana</option>
    <option>6 - Solape membrana</option>
    <option>7 - Inicio prueba</option>
    <option>8 - Fin prueba</option>
    <option>9 - Protección</option>
</select>

<label>📸 Foto</label>
<input type="file" name="foto" accept="image/*" capture="environment" required>

<button type="submit">✅ Enviar Registro</button>

</form>
