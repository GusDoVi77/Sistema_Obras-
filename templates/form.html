<!DOCTYPE html>
<html>
<head>
    <title>Registro de Obra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 420px;
            margin: auto;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 16px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
        }

        button:active {
            background: #1e7e34;
        }
    </style>
</head>

<body>

<div class="card">

<h2>📋 Registro de Trabajo</h2>

<form method="POST" enctype="multipart/form-data">

<label>🏗️ Obra</label>
<input type="text" name="obra" required>

<label>👷 Obrero</label>
<input type="text" name="nombre" required>

<label>📍 Ubicación</label>
<input type="text" name="ubicacion" placeholder="Nivel 5 - Depto 203" required>

<label>⚙️ Actividad</label>
<select name="actividad">
    <option>Contrapiso</option>
    <option>Impermeabilización</option>
    <option>Terminación</option>
</select>

<label>📋 Etapa</label>
<select name="etapa" required>
    <option value="">Seleccionar</option>
    <option>1 - Contrapiso</option>
    <option>2 - Carpeta</option>
    <option>3 - Babetas</option>
    <option>4 - Impermeabilización</option>
    <option>5 - Pegado membrana</option>
    <option>6 - Solape membrana</option>
    <option>7 - Inicio prueba</option>
    <option>8 - Fin prueba</option>
    <option>9 - Protección</option>
</select>

<label>📊 Cantidad</label>
<input type="number" name="cantidad" required>

<label>📸 Foto</label>
<input type="file" name="foto" accept="image/*" capture="environment" required>

<button type="submit">✅ Enviar Registro</button>

</form>

</div>

</body>
</html>
